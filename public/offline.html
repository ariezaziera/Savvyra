<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | Savvyra</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #453284;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      color: white;
    }

    .blob {
      position: fixed;
      border-radius: 9999px;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: #6A49FA;
      top: -150px;
      left: -150px;
      filter: blur(120px);
      opacity: 0.85;
      animation: blob-drift-1 12s ease-in-out infinite alternate;
    }

    .blob-2 {
      width: 450px;
      height: 450px;
      background: #C6E6FF;
      bottom: -100px;
      right: -100px;
      filter: blur(110px);
      opacity: 0.55;
      animation: blob-drift-2 15s ease-in-out infinite alternate;
    }

    .blob-3 {
      width: 380px;
      height: 380px;
      background: #FEDADA;
      top: 30%;
      right: 10%;
      filter: blur(100px);
      opacity: 0.45;
      animation: blob-drift-3 10s ease-in-out infinite alternate;
    }

    @keyframes blob-drift-1 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(40px, 60px) scale(1.1);
      }
    }

    @keyframes blob-drift-2 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(-50px, -40px) scale(1.08);
      }
    }

    @keyframes blob-drift-3 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(30px, -50px) scale(0.95);
      }
    }

    .card {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 520px;
      padding: 42px;
      border-radius: 32px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.14);
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    }

    .offline-icon {
      font-size: 90px;
      margin-bottom: 12px;
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-12px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    h1 {
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 18px;
    }

    p {
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      font-size: 16px;
    }

    button {
      margin-top: 32px;
      border: none;
      outline: none;
      background: white;
      color: #453284;
      padding: 14px 24px;
      border-radius: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      transform: scale(1.03);
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">

    <div class="offline-icon">
      📡
    </div>

    <h1>
      You're offline.
    </h1>

    <p>
      It seems your internet connection is unavailable.
      Please reconnect and try again.
    </p>

    <button onclick="window.location.reload()">
      Try Again
    </button>

    <div class="footer">
      Crafted by Arieza for modern financial living.
    </div>
  </div>
</body>
</html>
